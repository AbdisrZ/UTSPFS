<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Detail Tugas — Smart Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="phone-wrapper">
  <div class="phone-device">

    <div class="phone-side-left" aria-hidden="true">
      <div class="side-btn" title="Volume Up"></div>
      <div class="side-btn" title="Volume Down"></div>
    </div>
    <div class="phone-side-right" aria-hidden="true">
      <div class="side-btn" title="Power"></div>
    </div>

  <div class="phone-frame">

    <!-- Status bar -->
    <div class="status-bar" id="statusBarEl">
      <span class="status-time" id="statusTime">9:41</span>
      <div class="status-icons">
        <svg width="16" height="12" viewBox="0 0 16 12">
          <rect x="0"    y="8"   width="3" height="4"  rx="0.5"/>
          <rect x="4.3"  y="5.5" width="3" height="6.5" rx="0.5"/>
          <rect x="8.6"  y="3"   width="3" height="9"  rx="0.5"/>
          <rect x="12.9" y="0"   width="3" height="12" rx="0.5"/>
        </svg>
        <svg width="16" height="12" viewBox="0 0 24 18">
          <circle cx="12" cy="16" r="2"/>
          <path d="M6.5 11.5C8 9.9 9.9 9 12 9s3.9.9 5.5 2.5l1.8-1.8C17.1 7.5 14.7 6.5 12 6.5s-5.1 1-7.3 3.2z" opacity=".7"/>
          <path d="M2.5 7.5C5.1 4.8 8.4 3.2 12 3.2s6.9 1.6 9.5 4.3l1.8-1.8C20.5 2.9 16.5 1 12 1S3.5 2.9.7 5.7z" opacity=".4"/>
        </svg>
        <svg width="26" height="12" viewBox="0 0 26 12">
          <rect x="0" y="0.5" width="22" height="11" rx="3" fill="none" stroke="currentColor" stroke-width="1.3"/>
          <rect x="22.8" y="3.5" width="2.5" height="5" rx="1" opacity=".7"/>
          <rect x="1.5" y="2" width="17" height="8" rx="1.5"/>
        </svg>
      </div>
    </div>

    <!-- Konten halaman -->
    <div class="phone-screen" id="phoneScreen">

      <!-- Placeholder: diisi oleh JS setelah task dimuat -->
      <div id="detailContent">
        <div style="display:flex;align-items:center;justify-content:center;height:300px">
          <p style="color:var(--one-ui-text-secondary);font-size:14px">Memuat...</p>
        </div>
      </div>

    </div><!-- /phone-screen -->

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" role="navigation" aria-label="Navigasi utama">
      <a href="index.html" class="nav-item" aria-label="Beranda">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
        <span class="nav-label">Beranda</span>
      </a>
      <a href="add-task.html" class="nav-item" aria-label="Tambah tugas">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
        </svg>
        <span class="nav-label">Tambah</span>
      </a>
      <a href="search.html" class="nav-item" aria-label="Cari tugas">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>
        <span class="nav-label">Cari</span>
      </a>
    </nav>

    <!-- Home indicator -->
    <div class="home-indicator" aria-hidden="true"></div>

    <!-- Modal konfirmasi hapus -->
    <div class="modal-overlay" id="deleteModal" role="dialog" aria-modal="true" aria-labelledby="deleteTitle">
      <div class="bottom-sheet">
        <div class="sheet-handle" aria-hidden="true"></div>
        <h2 class="sheet-title" id="deleteTitle">Hapus tugas ini?</h2>
        <p class="sheet-subtitle">Tugas yang dihapus tidak bisa dikembalikan lagi.</p>
        <div class="sheet-actions">
          <button class="btn-danger" onclick="executeDelete()">Hapus</button>
          <button class="btn-cancel" onclick="closeModal('deleteModal')">Batal</button>
        </div>
      </div>
    </div>

  </div><!-- /phone-frame -->
  </div><!-- /phone-device -->
</div><!-- /phone-wrapper -->

<script src="js/app.js"></script>
<script src="js/zoom-control.js"></script>
<script>
  // Warna teks status bar disesuaikan dengan header (atas gradient berwarna)
  const statusBar = document.getElementById('statusBarEl');
  const statusTime = document.getElementById('statusTime');

  // Muat dan render detail task
  const taskId = getUrlParam('id');

  if (!taskId) {
    window.location.href = 'index.html';
  }

  let currentTask = null;

  function renderDetail() {
    currentTask = getTask(taskId);

    if (!currentTask) {
      document.getElementById('detailContent').innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;padding:24px;text-align:center">
          <p style="font-size:18px;font-weight:700;margin-bottom:8px">Tugas tidak ditemukan</p>
          <p style="color:var(--one-ui-text-secondary);font-size:14px;margin-bottom:20px">Tugas mungkin sudah dihapus</p>
          <a href="index.html" style="color:var(--one-ui-primary);font-size:15px;font-weight:600">← Kembali ke Beranda</a>
        </div>`;
      return;
    }

    const task = currentTask;
    const priorityLabels = { high: 'High', medium: 'Medium', low: 'Low' };
    const deadlineClass   = getDeadlineClass(task.deadline);
    const deadlineColors  = { urgent: 'red', soon: 'yellow', normal: 'green' };

    // Warna ikon info berdasarkan deadline
    const deadlineIconColor = deadlineColors[deadlineClass];

    // Sesuaikan warna status bar dengan header gradient
    statusBar.classList.add('overlay-mode');
    statusTime.style.color = 'rgba(255,255,255,0.92)';
    statusBar.querySelectorAll('.status-icons svg').forEach(s => {
      s.style.color = 'rgba(255,255,255,0.85)';
    });

    document.getElementById('detailContent').innerHTML = `
      <!-- Header gradient sesuai prioritas -->
      <div class="detail-header priority-${task.priority}" style="padding-top:52px">
        <div class="detail-header-top">
          <button class="detail-back-btn" onclick="history.back()" aria-label="Kembali">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
              <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
            </svg>
          </button>
          <div class="toggle-wrapper">
            <span class="toggle-label-text">${task.completed ? 'Selesai' : 'Aktif'}</span>
            <div class="toggle-switch">
              <input type="checkbox" class="toggle-input" id="toggleComplete"
                     ${task.completed ? 'checked' : ''}
                     onchange="handleToggleComplete(this.checked)"
                     aria-label="Tandai tugas selesai">
              <div class="toggle-track"></div>
            </div>
          </div>
        </div>
        <h1 class="detail-title">${escapeHtml(task.title)}</h1>
        <div class="detail-status-badge">
          ${task.completed
            ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> Selesai`
            : `<svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg> Aktif`
          }
        </div>
      </div>

      <!-- Info section -->
      <div class="detail-content">

        <!-- Card info utama -->
        <div class="info-card">
          <div class="info-row">
            <div class="info-icon blue">
              <svg width="18" height="18" viewBox="0 0 24 24">
                <path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-2 .89-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.11-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/>
              </svg>
            </div>
            <div class="info-text">
              <div class="info-text-label">Deadline</div>
              <div class="info-text-value">${formatDateLong(task.deadline)}</div>
            </div>
          </div>
          <div class="info-row">
            <div class="info-icon ${deadlineIconColor}">
              <svg width="18" height="18" viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
              </svg>
            </div>
            <div class="info-text">
              <div class="info-text-label">Prioritas</div>
              <div class="info-text-value">
                <span class="priority-badge priority-${task.priority}">
                  ${priorityLabels[task.priority]}
                </span>
              </div>
            </div>
          </div>
          <div class="info-row">
            <div class="info-icon grey">
              <svg width="18" height="18" viewBox="0 0 24 24">
                <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/>
              </svg>
            </div>
            <div class="info-text">
              <div class="info-text-label">Dibuat</div>
              <div class="info-text-value">${formatTimestamp(task.createdAt)}</div>
            </div>
          </div>
        </div>

        <!-- Card deskripsi -->
        <div class="desc-card">
          <div class="desc-card-label">Deskripsi</div>
          <div class="desc-card-text ${!task.description ? 'desc-card-empty' : ''}">
            ${task.description ? escapeHtml(task.description) : 'Tidak ada deskripsi'}
          </div>
        </div>

        <!-- Tombol aksi -->
        <div class="action-section">
          <button class="btn-outline" onclick="editTask('${task.id}')">
            Edit Tugas
          </button>
          <button class="btn-text-danger" onclick="confirmDeleteTask('${task.id}')">
            Hapus Tugas
          </button>
        </div>

      </div><!-- /detail-content -->
    `;
  }

  // Toggle status selesai
  function handleToggleComplete(checked) {
    if (!currentTask) return;
    updateTask(currentTask.id, { completed: checked });
    showToast(checked ? 'Tugas diselesaikan ✓' : 'Tugas diaktifkan kembali');
    // Re-render detail tanpa refresh halaman
    setTimeout(() => renderDetail(), 300);
  }

  // Override executeDelete untuk navigasi kembali ke home
  const _origExecuteDelete = executeDelete;
  function executeDelete() {
    if (_pendingDeleteId || currentTask) {
      const idToDel = _pendingDeleteId || currentTask.id;
      deleteTask(idToDel);
      closeModal('deleteModal');
      window.location.href = 'index.html';
    }
  }

  // Render detail saat halaman dimuat
  renderDetail();
</script>
</body>
</html>
